name: LaBerceuse
options:
  bundleIdPrefix: app.atelier.laberceuse
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  # Bilingual: French (default / fallback) + English. Keeps the system
  # permission prompts (HealthKit) localized via InfoPlist.strings.
  knownRegions:
    - en
    - fr
    - Base

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    # Bump on each device reinstall so iPadOS/iOS refreshes the cached home-screen
    # icon instead of keeping a stale (blank) slot from an earlier install.
    CURRENT_PROJECT_VERSION: "5"
    # Jac's paid Apple Developer team — must live in the BASE settings so it
    # propagates to every target and ./gen.sh keeps it.
    DEVELOPMENT_TEAM: "9WZ66DZ69J"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_EMIT_LOC_STRINGS: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  LaBerceuse:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: iOS
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.laberceuse
        PRODUCT_NAME: La Berceuse
        INFOPLIST_FILE: iOS/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        ENABLE_PREVIEWS: YES
    entitlements:
      path: iOS/LaBerceuse.entitlements
      properties:
        # HealthKit will SILENTLY fail to authorize without this entitlement —
        # usage strings alone are NOT enough.
        com.apple.developer.healthkit: true
    dependencies:
      # Lock-screen / Dynamic Island sleep-timer countdown.
      - target: LaBerceuseWidgets

  LaBerceuseWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Widgets
      # The activity attributes are shared with the app target.
      - path: Sources/Activity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.laberceuse.widgets
        PRODUCT_NAME: LaBerceuseWidgets
        # Xcode merges this file's NSExtension dict into the generated plist.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: Widgets/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: La Berceuse
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "1,2"

  LaBerceuseTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: LaBerceuse
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.atelier.laberceuse.tests
        GENERATE_INFOPLIST_FILE: YES
        # PRODUCT_NAME of the app is "La Berceuse" (with a space), so xcodegen's
        # auto-derived TEST_HOST (which assumes the target name) is wrong.
        # Point it at the real built product explicitly.
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/La Berceuse.app/La Berceuse"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  LaBerceuse:
    build:
      targets:
        LaBerceuse: all
        LaBerceuseTests: [test]
    test:
      targets:
        - LaBerceuseTests
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
